<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

/* ---------------- BODY ---------------- */
body{
    width:100%;
    margin:0;
    padding:0;
    background-color:#fafafa;
}

/* ---------------- NAVBAR ---------------- */
nav{
    display:inline-block;
    width:100%;
    height:54px;
    background:white;
    border-bottom:1px solid #e5e5e5;
    position:relative;
}

/* Instagram Logo */
#logo{
    height:40px;
    position:relative;
    top:7px;
    left:10px;
}

/* Search Box */
nav input{
    height:25px;
    width:30vw;
    position:relative;
    left:35vw;
    right:35vw;
    background:#fafafa;
    text-align:center;
    border:1px solid #b5b5b5;
    border-radius:3px;
}

/* Actions Image */
#actions{
    height:40px;
    position:relative;
    float:right;
    right:0;
    top:7px;
}

/* ---------------- STORIES SECTION ---------------- */
#stories{
    height:90px;
    width:70vw;
    margin-top:-5px;
    margin-left:auto;
    margin-right:auto;
    border:1px solid #b5b5b5;
    border-radius:2px;
    padding-left:30px;
    background:white;
}

/* ---------------- USER CLASS ---------------- */
.user{
    width:18%;
    display:inline-block;
}

/* Paragraph inside user */
.user p{
    text-align:center;
    margin:0;
    font-family:"Lucida Sans Unicode";
    font-weight:100;
    font-size:smaller;
}

/* Images inside user */
.user img{
    margin-top:5px;
    border-radius:50%;
    border:4px double #b5b5b5;
    width:56px;
    height:56px;
    display:block;
    margin-left:auto;
    margin-right:auto;
}

/* ---------------- POST ---------------- */
.post{
    border:1px solid #b5b5b5;
    border-radius:2px;
    height:60vh;
    width:560px;
    margin:10px auto;   /* centers the whole box */
    background:white;
}
/* ---------------- POST HEADER ---------------- */
.post-header{
    background:white;
    height:50px;
    box-sizing:border-box;
    width:100%;
    padding:5px;
    border-bottom:1px solid #b5b5b5;
}

</style>
</head>

<body>

<nav>
    <img id="logo" src="img/instagran.png" alt="instagran logo">
    <input type="text" placeholder="search">
    <img id="actions" src="img/actions.png" alt="actions">
</nav>

<section id="stories">
    <div class="user">
        <img src="img/gran1.jpg">
        <p>Elma</p>
    </div>
    <div class="user">
        <img src="img/gran2.jpg">
        <p>Betty</p>
    </div>
    <div class="user">
        <img src="img/gran3.jpg">
        <p>Sandra</p>
    </div>
    <div class="user">
        <img src="img/gran4.jpg">
        <p>Delores</p>
    </div>
    <div class="user">
        <img src="img/gran5.jpg">
        <p>Karen</p>
    </div>
</section>

<section class="post">
    <div class="post-header">
        <img src="img/gran1.jpg" height="40">
        <span>Elma</span>
    </div>
    <div>
        <img class="post-image" src="img/motorcycle.jpeg" alt="cage image" width="100%">
    </div>
</section>

<footer></footer>

</body>
</html>
